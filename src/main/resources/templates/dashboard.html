<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Dashboard | FoodBridge</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container fade-up">

    <!-- Hero -->

    <div class="card bg-success text-white mb-4">

        <div class="card-body p-5">

            <h2>

                Welcome Back 👋

            </h2>

            <p class="mb-0">

                Together we can reduce food waste and feed communities.

            </p>

        </div>

    </div>

    <!-- Stats -->

    <div class="row g-4">

        <div class="col-lg-3 col-md-6">

            <div class="card stats-card">

                <i class="bi bi-box-seam-fill"></i>

                <h2 id="totalDonations">0</h2>

                <p>Total Donations</p>

            </div>

        </div>

        <div class="col-lg-3 col-md-6">

            <div class="card stats-card">

                <i class="bi bi-check-circle-fill text-success"></i>

                <h2 id="availableDonations">0</h2>

                <p>Available</p>

            </div>

        </div>

        <div class="col-lg-3 col-md-6">

            <div class="card stats-card">

                <i class="bi bi-hourglass-split text-warning"></i>

                <h2 id="claimedDonations">0</h2>

                <p>Claimed</p>

            </div>

        </div>

        <div class="col-lg-3 col-md-6">

            <div class="card stats-card">

                <i class="bi bi-truck text-primary"></i>

                <h2 id="deliveredDonations">0</h2>

                <p>Delivered</p>

            </div>

        </div>

    </div>

    <!-- Table -->

    <div class="card mt-5">

        <div class="card-header bg-success text-white">

            <i class="bi bi-clock-history"></i>

            Recent Donations

        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover">

                    <thead>

                    <tr>

                        <th>Food</th>

                        <th>Quantity</th>

                        <th>Status</th>

                        <th>Expiry</th>

                    </tr>

                    </thead>

                    <tbody id="donationTable">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<div th:replace="fragments/footer :: footer"></div>

<script th:src="@{/js/common.js}"></script>

<script th:src="@{/js/dashboard.js}"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
